name: iOS Beta Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  # 固定 sing-box 版本号，避免上游发新版把你的 CI 跑挂
  SING_BOX_VERSION: v1.11.0
  # 显式锁定 Xcode 版本号（而不是依赖 runner 默认版本）。
  # macos-14 即将被 GitHub 弃用且 Xcode 版本偏老，无法打开
  # Xcode 16+ 生成的新版工程文件格式；这里统一用 macos-15 +
  # 固定的 Xcode 16.4，两个 job 保持完全一致，避免"生成 xcframework
  # 的 Xcode"和"实际读取/编译的 Xcode"版本不同步。
  XCODE_VERSION: '16.4'

jobs:
  # ------------------------------------------------------------------
  # Job 1: 编译 sing-box 的 Libbox.xcframework (采用压缩归档保存)
  # ------------------------------------------------------------------
  build-libbox:
    runs-on: macos-15
    timeout-minutes: 30
    outputs:
      cache-hit: ${{ steps.cache-libbox.outputs.cache-hit }}
    env:
      CGO_ENABLED: 1
      GOFLAGS: -ldflags=-linkmode=external
    steps:
      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      # 升级为 v5：因为 actions/cache 的保存动作是 job 结束时自动触发的
      # post 步骤，不会检查整个 job 是否成功——哪怕产出的 zip 是坏的，
      # 只要文件存在就会被缓存下来，之后每次都会命中同一份坏缓存。
      # 所以每次怀疑产物有问题，都应该把这个版本号再往上提一次。
      - name: Cache libbox archive
        id: cache-libbox
        uses: actions/cache@v4
        with:
          path: libbox-output/Libbox.xcframework.zip
          key: libbox-${{ env.SING_BOX_VERSION }}-v5-${{ runner.os }}

      - name: Set up Go 1.22
        if: steps.cache-libbox.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install sagernet/gomobile toolchain
        if: steps.cache-libbox.outputs.cache-hit != 'true'
        env:
          CGO_ENABLED: 1
        run: |
          go install -ldflags="-linkmode=external" -v github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install -ldflags="-linkmode=external" -v github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          codesign -s - "$(go env GOPATH)/bin/gomobile"
          codesign -s - "$(go env GOPATH)/bin/gobind"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: gomobile init
        if: steps.cache-libbox.outputs.cache-hit != 'true'
        run: gomobile init

      - name: Clone sing-box
        if: steps.cache-libbox.outputs.cache-hit != 'true'
        run: |
          git clone --branch ${{ env.SING_BOX_VERSION }} --depth 1 https://github.com/SagerNet/sing-box.git

      - name: Build Libbox.xcframework
        if: steps.cache-libbox.outputs.cache-hit != 'true'
        working-directory: sing-box
        run: |
          set -e
          make lib_ios
          FRAMEWORK_PATH=$(find . -iname "Libbox.xcframework" -maxdepth 3 | head -n 1)
          if [ -z "$FRAMEWORK_PATH" ]; then
            echo "找不到 Libbox.xcframework，请检查 build 日志确认实际产出路径"
            find . -iname "*.xcframework"
            exit 1
          fi
          echo "FRAMEWORK_PATH=$FRAMEWORK_PATH" >> "$GITHUB_ENV"

      # 关键调试步骤：在打包之前，先确认 gomobile 生成的 Info.plist
      # 本身是不是合法的 XCFramework 清单。如果这一步打印出来的内容
      # 就已经缺 AvailableLibraries 等字段，说明问题出在 gomobile/Xcode
      # 版本兼容性，跟后面的 zip/缓存逻辑无关。
      - name: Debug Info.plist before zipping
        if: steps.cache-libbox.outputs.cache-hit != 'true'
        working-directory: sing-box
        run: |
          echo "== Xcode 版本 =="
          xcodebuild -version
          echo "== 文件类型 =="
          file "$FRAMEWORK_PATH/Info.plist"
          echo "== plist 内容（转成 xml 方便阅读）=="
          plutil -convert xml1 -o - "$FRAMEWORK_PATH/Info.plist"
          echo "== 是否包含 AvailableLibraries 关键字段 =="
          if plutil -convert xml1 -o - "$FRAMEWORK_PATH/Info.plist" | grep -q "AvailableLibraries"; then
            echo "OK: 包含 AvailableLibraries"
          else
            echo "警告: 未找到 AvailableLibraries，这份 xcframework 很可能是不完整/格式不对的"
            exit 1
          fi

      # 使用 -y 参数强制保留 Apple Framework 内部的符号链接(Symlinks)，配合绝对路径精准打包
      - name: Archive Libbox.xcframework
        if: steps.cache-libbox.outputs.cache-hit != 'true'
        working-directory: sing-box
        run: |
          set -e
          mkdir -p $GITHUB_WORKSPACE/libbox-output
          cd $(dirname "$FRAMEWORK_PATH")
          zip -r -y $GITHUB_WORKSPACE/libbox-output/Libbox.xcframework.zip $(basename "$FRAMEWORK_PATH")
          # 打包完立刻自检一次压缩包本身是否完整，避免把坏包缓存/上传出去
          cd $GITHUB_WORKSPACE
          unzip -t libbox-output/Libbox.xcframework.zip > /dev/null

      - name: Upload libbox artifact
        uses: actions/upload-artifact@v4
        with:
          name: libbox-archive
          path: libbox-output/Libbox.xcframework.zip
          retention-days: 7

  # ------------------------------------------------------------------
  # Job 2: 原有的 Flutter iOS 构建流程，加入旧目录清理与 zip 解压步骤
  # ------------------------------------------------------------------
  build:
    needs: build-libbox
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Cache Flutter pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Set build number
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d '+' -f 1)
          sed -i.bak "s/^version: .*/version: ${VERSION_NAME}+${{ github.run_number }}/" pubspec.yaml
          cat pubspec.yaml | grep version

      - name: Download libbox artifact
        uses: actions/download-artifact@v4
        with:
          name: libbox-archive
          path: ./temp-libbox

      # 先 rm -rf 彻底清理可能存在的冲突目录，再静默覆盖解压，并验证 plist 语法+语义
      - name: Extract and verify libbox framework
        run: |
          set -e
          mkdir -p ios
          rm -rf ios/Libbox.xcframework
          unzip -q -o ./temp-libbox/Libbox.xcframework.zip -d ios/
          ls -la ios/Libbox.xcframework
          echo "== Xcode 版本（用于实际读取 xcframework 的这台 runner）=="
          xcodebuild -version
          echo "== 文件类型 =="
          file ios/Libbox.xcframework/Info.plist
          echo "== 语法检查 =="
          plutil -lint ios/Libbox.xcframework/Info.plist
          echo "== 语义检查：是否包含 AvailableLibraries =="
          if ! plutil -convert xml1 -o - ios/Libbox.xcframework/Info.plist | grep -q "AvailableLibraries"; then
            echo "错误: Info.plist 缺少 AvailableLibraries，xcframework 不完整"
            exit 1
          fi

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-${{ hashFiles('**/*.swift', '**/*.m', '**/*.dart') }}
          restore-keys: |
            ${{ runner.os }}-derived-

      - name: Build Flutter iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install fastlane
        run: gem install fastlane

      - name: Run fastlane beta
        working-directory: ios
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: fastlane beta