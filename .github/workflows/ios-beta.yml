name: iOS Beta Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  XCODE_VERSION: 'latest-stable'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true # 显式开启 LFS，确保大静态库能被完整拉取成真实物理文件

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Cache Flutter pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Set build number
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d '+' -f 1)
          sed -i.bak "s/^version: .*/version: ${VERSION_NAME}+${{ github.run_number }}/" pubspec.yaml
          cat pubspec.yaml | grep version

      - name: Find, Flatten Shallow Bundle and Verify committed Libbox
        run: |
          set -e
          echo "== 1. 寻找仓库中提交的 Libbox.xcframework =="
          LIBBOX_PATH=$(find ios -iname "Libbox.xcframework" | head -n 1)
          if [ -z "$LIBBOX_PATH" ]; then
            echo "❌ 找不到 Libbox.xcframework！请确认你已经将它强制提交到了 Git 仓库的 ios 目录下！"
            find . -name "*Libbox*"
            exit 1
          fi
          echo "✅ 成功找到库路径: $LIBBOX_PATH"
          
          echo "== 2. 正在执行绝对安全的 Shallow Bundle 扁平化（彻底消灭软链接与层级报错）=="
          find "$LIBBOX_PATH" -name "*.framework" | while read -r FW_PATH; do
            if [ -d "$FW_PATH/Versions" ]; then
              echo "正在清扫软链接并扁平化: $FW_PATH ..."
              
              TMP_DIR=$(mktemp -d)
              REAL_DIR="$FW_PATH/Versions/Current"
              [ ! -d "$REAL_DIR" ] && REAL_DIR="$FW_PATH/Versions/A"
              cp -R -L "$REAL_DIR/"* "$TMP_DIR/" 2>/dev/null || true
              
              if [ -f "$TMP_DIR/Resources/Info.plist" ]; then
                cp -L "$TMP_DIR/Resources/Info.plist" "$TMP_DIR/Info.plist" 2>/dev/null || true
              fi
              
              rm -rf "$FW_PATH/"*
              cp -R "$TMP_DIR/"* "$FW_PATH/" 2>/dev/null || true
              rm -rf "$TMP_DIR"
            fi

            # 防空保底：如果 Info.plist 为空或丢失，自动重写合法的苹果框架 XML 元数据
            if [ ! -s "$FW_PATH/Info.plist" ] || [ -L "$FW_PATH/Info.plist" ]; then
              rm -f "$FW_PATH/Info.plist"
              cat <<EOF > "$FW_PATH/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>Libbox</string>
            <key>CFBundleIdentifier</key>
            <string>Libbox</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>Libbox</string>
            <key>CFBundlePackageType</key>
            <string>FMWK</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>MinimumOSVersion</key>
            <string>13.0</string>
          </dict>
          </plist>
          EOF
            fi
            echo "✅ [$FW_PATH] 结构转换完成！"
          done

          echo "== 3. 最终语义检查：验证 Libbox.xcframework =="
          if ! plutil -convert xml1 -o - "$LIBBOX_PATH/Info.plist" | grep -q "AvailableLibraries"; then
            echo "❌ 错误: Info.plist 缺少 AvailableLibraries，xcframework 不完整"
            exit 1
          fi
          echo "✅ Libbox 准备就绪，开始构建 Flutter iOS！"

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Build Flutter iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install fastlane
        run: gem install fastlane

      - name: Run fastlane beta
        working-directory: ios
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: fastlane beta