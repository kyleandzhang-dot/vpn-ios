name: iOS Beta Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  # 固定 sing-box 版本号，避免上游发新版把你的 CI 跑挂
  SING_BOX_VERSION: v1.11.0

jobs:
  # ------------------------------------------------------------------
  # Job 1: 编译 sing-box 的 libbox.xcframework
  # 只有 SING_BOX_VERSION 变化时才会重新编译（靠 cache key 命中判断）
  # ------------------------------------------------------------------
  build-libbox:
    runs-on: macos-latest
    timeout-minutes: 30
    outputs:
      cache-hit: ${{ steps.cache-libbox.outputs.cache-hit }}
    steps:
      - name: Cache libbox xcframework
        id: cache-libbox
        uses: actions/cache@v4
        with:
          path: libbox-output/Libbox.xcframework
          key: libbox-${{ env.SING_BOX_VERSION }}-${{ runner.os }}

      - name: Set up Go
        if: steps.cache-libbox.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install gomobile
        if: steps.cache-libbox.outputs.cache-hit != 'true'
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Clone sing-box
        if: steps.cache-libbox.outputs.cache-hit != 'true'
        run: |
          git clone --branch ${{ env.SING_BOX_VERSION }} --depth 1 https://github.com/SagerNet/sing-box.git

      - name: Build Libbox.xcframework
        if: steps.cache-libbox.outputs.cache-hit != 'true'
        working-directory: sing-box
        run: |
          make ios
          mkdir -p ../libbox-output
          # sing-box 官方 Makefile 产出路径以实际仓库为准，如有变化按 build 日志调整
          cp -R Libbox.xcframework ../libbox-output/

      - name: Upload libbox artifact
        uses: actions/upload-artifact@v4
        with:
          name: libbox-xcframework
          path: libbox-output/Libbox.xcframework
          retention-days: 7

  # ------------------------------------------------------------------
  # Job 2: 原有的 Flutter iOS 构建流程，加入 libbox 拷贝步骤
  # ------------------------------------------------------------------
  build:
    needs: build-libbox
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Cache Flutter pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Set build number
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d '+' -f 1)
          sed -i.bak "s/^version: .*/version: ${VERSION_NAME}+${{ github.run_number }}/" pubspec.yaml
          cat pubspec.yaml | grep version

      - name: Download libbox artifact
        uses: actions/download-artifact@v4
        with:
          name: libbox-xcframework
          path: ios/Frameworks/Libbox.xcframework

      # 如果 PacketTunnelExtension 是通过 CocoaPods/Podfile 手动 link 的
      # 而不是走 Xcode 项目里直接引用 Frameworks 目录，
      # 这一步可以省略，改成在 Podfile 里指定 vendored_frameworks 路径
      - name: Verify libbox framework
        run: ls -la ios/Frameworks/Libbox.xcframework

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-${{ hashFiles('**/*.swift', '**/*.m', '**/*.dart') }}
          restore-keys: |
            ${{ runner.os }}-derived-

      - name: Build Flutter iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install fastlane
        run: gem install fastlane

      - name: Run fastlane beta
        working-directory: ios
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: fastlane beta